<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f4f1e8;
      --panel: #fffaf0;
      --ink: #172121;
      --muted: #5e6b64;
      --line: #d7d0c2;
      --accent: #0b6e4f;
      --warn: #a44a3f;
      --chip: #ece4d8;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(11,110,79,0.08), transparent 28%),
        linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    h1, h2, h3 {
      margin: 0 0 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    p, li, td, th, a, input {
      font-size: 15px;
      line-height: 1.45;
    }
    a { color: var(--accent); text-decoration: none; }
    .topbar {
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav a {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
    }
    .hero {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,250,240,0.85);
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      gap: 18px;
    }
    .grid.two {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(23,33,33,0.04);
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .muted { color: var(--muted); }
    .warn { color: var(--warn); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      text-align: left;
      vertical-align: top;
      padding: 10px 8px;
      border-top: 1px solid var(--line);
    }
    .preview {
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      background: #f8f4eb;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
    }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1>{{ title }}</h1>
        <div class="muted">grounded ops, queue-first, read-only MVP</div>
      </div>
      <div class="nav">
        <a href="{{ url_for('ops.queue_page') }}">Queue</a>
        <a href="{{ url_for('ops.health_page') }}">Health</a>
      </div>
    </div>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
